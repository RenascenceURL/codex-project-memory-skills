name: CI

on:
  push:
  pull_request:

jobs:
  smoke:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Syntax Check
        run: python -m py_compile scripts/memory_manager.py

      - name: Smoke Test
        shell: bash
        run: |
          set -euo pipefail
          tmp="$(mktemp -d)"
          python scripts/memory_manager.py init --project-path "$tmp" --global-rules "$tmp/.codex/GLOBAL_ENGINEERING_RULES.md"
          python scripts/memory_manager.py context --project-path "$tmp" --global-rules "$tmp/.codex/GLOBAL_ENGINEERING_RULES.md" --json > "$tmp/context.json"
          python scripts/memory_manager.py save --project-path "$tmp" --global-rules "$tmp/.codex/GLOBAL_ENGINEERING_RULES.md" --mode task --title "ci-smoke" --next "next-step"
          python scripts/memory_manager.py list-tasks --project-path "$tmp" --json > "$tmp/tasks.json"
          python scripts/memory_manager.py activate-task --project-path "$tmp" --task-id "ci-smoke"
          python scripts/memory_manager.py stats --project-path "$tmp"
          python scripts/memory_manager.py weekly-report --project-path "$tmp"
